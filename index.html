<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Converter — 在线转换 PDF 为 Word / PowerPoint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-2: #1f2b47;
      --gold: #d4a853;
      --gold-dim: #a07830;
      --coral: #e94560;
      --text: #eaeaea;
      --muted: #a0a0a0;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      width: 100%;
      padding: 64px 24px 48px;
      text-align: center;
      background: linear-gradient(160deg, #1a1a2e 0%, #0f1629 60%, #1a1a2e 100%);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 300px;
      background: radial-gradient(ellipse, rgba(212,168,83,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero h1 {
      font-family: 'Noto Serif SC', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    .hero h1 .gold { color: var(--gold); }
    .hero p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto;
    }

    .container {
      width: 100%;
      max-width: 640px;
      padding: 0 20px 80px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .drop-zone {
      border: 2px dashed rgba(212,168,83,0.4);
      border-radius: calc(var(--radius) / 1.5);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
      user-select: none;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--gold);
      background: rgba(212,168,83,0.04);
    }
    .drop-zone.has-file {
      border-style: solid;
      border-color: var(--gold-dim);
    }

    .drop-icon {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 14px;
      filter: grayscale(0.3);
    }
    .drop-zone p { color: var(--muted); font-size: 0.9rem; }
    .drop-zone .main-hint {
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    #fileInfo {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--surface-2);
      border-radius: 8px;
      font-size: 0.875rem;
    }
    #fileInfo .fname { font-weight: 600; color: var(--gold); word-break: break-all; }
    #fileInfo .fsize { color: var(--muted); margin-top: 4px; }

    #fileInput { display: none; }

    .format-label {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .format-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .format-card {
      background: var(--surface-2);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 18px 16px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .format-card:hover { background: #243256; }
    .format-card.active {
      border-color: var(--gold);
      background: rgba(212,168,83,0.07);
    }
    .format-card .fmt-icon { font-size: 32px; }
    .format-card .fmt-name { font-weight: 600; font-size: 0.95rem; }
    .format-card .fmt-ext { font-size: 0.75rem; color: var(--muted); }

    .btn-convert {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold) 0%, #c4933f 100%);
      color: #1a1a2e;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.25s, transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 4px 20px rgba(212,168,83,0.25);
    }
    .btn-convert:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(212,168,83,0.35);
    }
    .btn-convert:active:not(:disabled) { transform: translateY(0); }
    .btn-convert:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-convert .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(26,26,46,0.3);
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-wrap { display: none; }
    .progress-wrap.visible { display: block; }
    .progress-track {
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--coral) 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .progress-label {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
    }

    #status {
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
      line-height: 1.5;
    }
    #status.error {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(233,69,96,0.1);
      border: 1px solid rgba(233,69,96,0.35);
      color: #ff8fa3;
    }
    #status.success {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(80,200,120,0.08);
      border: 1px solid rgba(80,200,120,0.25);
      color: #7aff9a;
    }
    #status.info {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(212,168,83,0.08);
      border: 1px solid rgba(212,168,83,0.3);
      color: var(--gold);
    }

    footer {
      margin-top: auto;
      padding: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.8;
    }
    footer a { color: var(--gold-dim); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<section class="hero">
  <h1>PDF <span class="gold">Converter</span></h1>
  <p>将 PDF 文档转换为 Word 或 PowerPoint，轻松下载编辑。仅在浏览器本地处理，您的文件安全私密。</p>
</section>

<div class="container">
  <div class="card">

    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📄</div>
      <p class="main-hint">拖拽 PDF 文件到此处</p>
      <p>或点击选择文件 &nbsp;·&nbsp; 仅支持 .pdf 格式</p>
      <input type="file" id="fileInput" accept=".pdf,application/pdf">
      <div id="fileInfo">
        <div class="fname" id="fileName"></div>
        <div class="fsize" id="fileSize"></div>
      </div>
    </div>

    <div>
      <div class="format-label">选择导出格式</div>
      <div class="format-options">
        <div class="format-card active" data-format="docx" id="card-docx">
          <span class="fmt-icon">📝</span>
          <span class="fmt-name">Word 文档</span>
          <span class="fmt-ext">.docx</span>
        </div>
        <div class="format-card" data-format="pptx" id="card-pptx">
          <span class="fmt-icon">🖼️</span>
          <span class="fmt-name">PowerPoint</span>
          <span class="fmt-ext">.pptx</span>
        </div>
      </div>
    </div>

    <div id="status"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">正在处理…</div>
    </div>

    <button class="btn-convert" id="btnConvert" disabled>Convert &amp; Download</button>

  </div>
</div>

<footer>
  文件全程在本地处理，不会被上传至任何服务器。<br>
  基于 <a href="https://pdfjs.org" target="_blank">pdf.js</a>、
  <a href="https://docx.js.org" target="_blank">docx</a> 和
  <a href="https://pptxgenjs.com" target="_blank">pptxgenjs</a> 构建。
</footer>

<script type="module">
  import { Document, Paragraph, TextRun, HeadingLevel, Packer } from 'https://cdn.jsdelivr.net/npm/docx@8.5.0/+esm';
  import PptxGenJS from 'https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/+esm';

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfFile = null;
  let selectedFormat = 'docx';

  const dropZone     = document.getElementById('dropZone');
  const fileInput    = document.getElementById('fileInput');
  const fileInfo     = document.getElementById('fileInfo');
  const fileNameEl  = document.getElementById('fileName');
  const fileSizeEl  = document.getElementById('fileSize');
  const cardDocx    = document.getElementById('card-docx');
  const cardPptx    = document.getElementById('card-pptx');
  const btnConvert  = document.getElementById('btnConvert');
  const statusEl    = document.getElementById('status');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function showStatus(msg, type = 'info') {
    statusEl.className = type;
    const icon = type === 'error' ? '⚠️' : type === 'success' ? '✅' : '💡';
    statusEl.innerHTML = `<span style="font-size:1.1em">${icon}</span><span>${msg}</span>`;
    statusEl.style.display = 'flex';
  }

  function hideStatus() { statusEl.style.display = 'none'; }

  function setProgress(pct, label) {
    progressFill.style.width = pct + '%';
    if (label) progressLabel.textContent = label;
  }

  function setLoading(on) {
    if (on) {
      btnConvert.classList.add('loading');
      btnConvert.innerHTML = '<span class="spinner"></span>正在转换…';
      progressWrap.classList.add('visible');
      setProgress(0);
    } else {
      btnConvert.classList.remove('loading');
      btnConvert.innerHTML = 'Convert &amp; Download';
      progressWrap.classList.remove('visible');
      setProgress(0);
    }
  }

  function handleFile(file) {
    hideStatus();
    if (!file || file.type !== 'application/pdf') {
      showStatus('请选择一个有效的 PDF 文件。', 'error');
      return;
    }
    if (file.size > 80 * 1048576) {
      showStatus('文件过大（建议不超过 80 MB），可能导致浏览器卡顿。', 'error');
      return;
    }
    pdfFile = file;
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = formatBytes(file.size);
    fileInfo.style.display = 'block';
    dropZone.classList.add('has-file');
    btnConvert.disabled = false;
  }

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', e => {
    handleFile(e.target.files[0]);
  });

  [cardDocx, cardPptx].forEach(card => {
    card.addEventListener('click', () => {
      [cardDocx, cardPptx].forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      selectedFormat = card.dataset.format;
    });
  });

  btnConvert.addEventListener('click', convert);

  async function convert() {
    if (!pdfFile) return;
    hideStatus();
    setLoading(true);
    try {
      if (selectedFormat === 'docx') {
        await convertToDocx();
      } else {
        await convertToPptx();
      }
      showStatus('转换完成，文件已开始下载！', 'success');
    } catch (err) {
      console.error(err);
      showStatus('转换失败：' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  async function extractPDFText(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const numPages = pdf.numPages;
    const pages = [];
    for (let i = 1; i <= numPages; i++) {
      setProgress(Math.round((i / numPages) * 40), `正在提取第 ${i} / ${numPages} 页…`);
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(item => item.str).join('\n');
      pages.push({ pageNum: i, text });
    }
    return pages;
  }

  async function convertToDocx() {
    setProgress(10, '正在读取 PDF…');
    const pages = await extractPDFText(pdfFile);

    if (pages.every(p => !p.text.trim())) {
      throw new Error('无法从 PDF 中提取文字内容，可能为扫描版图片。');
    }

    setProgress(50, '正在生成 Word 文档…');
    const paragraphs = [];
    const baseName = pdfFile.name.replace(/\.pdf$/i, '');

    paragraphs.push(new Paragraph({
      text: baseName,
      heading: HeadingLevel.HEADING_1,
    }));

    pages.forEach(({ text }) => {
      if (!text.trim()) return;
      const lines = text.split('\n').filter(l => l.trim());
      lines.forEach(line => {
        paragraphs.push(new Paragraph({
          children: [new TextRun(line)],
        }));
      });
      paragraphs.push(new Paragraph({ text: '' }));
    });

    setProgress(80, '正在打包文件…');
    const doc = new Document({
      sections: [{ children: paragraphs }],
    });

    const blob = await Packer.toBlob(doc);
    downloadBlob(blob, baseName + '.docx');
    setProgress(100);
  }

  async function convertToPptx() {
    setProgress(10, '正在读取 PDF…');
    const pages = await extractPDFText(pdfFile);

    if (pages.every(p => !p.text.trim())) {
      throw new Error('无法从 PDF 中提取文字内容，可能为扫描版图片。');
    }

    setProgress(50, '正在生成 PowerPoint…');
    const pptx = new PptxGenJS();
    const baseName = pdfFile.name.replace(/\.pdf$/i, '');

    pptx.addSlide('title');
    pptx.addText(baseName, {
      x: 0.5, y: 2.5, w: '90%', h: 1.5,
      fontSize: 40, bold: true, color: 'd4a853',
      align: 'center', valign: 'middle',
    });
    pptx.addText('Converted from PDF', {
      x: 0.5, y: 4.2, w: '90%', h: 0.6,
      fontSize: 16, color: 'a0a0a0',
      align: 'center',
    });

    const CHARS_PER_SLIDE = 800;
    let currentText = '';
    let slideNum = 0;

    for (const { text } of pages) {
      if (!text.trim()) continue;
      const combined = currentText ? currentText + '\n\n' + text : text;

      if (combined.length <= CHARS_PER_SLIDE) {
        currentText = combined;
      } else {
        if (currentText) {
          slideNum++;
          addContentSlide(pptx, `内容 ${slideNum}`, currentText);
        }
        currentText = text.length > CHARS_PER_SLIDE ? text.slice(0, CHARS_PER_SLIDE) : text;
      }
    }

    if (currentText.trim()) {
      slideNum++;
      addContentSlide(pptx, `内容 ${slideNum}`, currentText);
    }

    setProgress(80, '正在打包文件…');
    const blob = await pptx.write({ blob: true });
    downloadBlob(blob, baseName + '.pptx');
    setProgress(100);
  }

  function addContentSlide(pptx, title, text) {
    const slide = pptx.addSlide();
    slide.addText(title, {
      x: 0.5, y: 0.4, w: '90%', h: 0.8,
      fontSize: 24, bold: true, color: 'd4a853',
      margin: 0,
    });
    slide.addText(text, {
      x: 0.5, y: 1.4, w: '90%', h: 5.2,
      fontSize: 16, color: 'eaeaea',
      align: 'left', valign: 'top',
      wrap: true,
    });
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 1000);
  }
</script>
</body>
</html>
